<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradingYourModel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top Bar */
    .top-bar {
      background: #16213e;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      border-bottom: 1px solid #0f3460;
    }

    .top-bar h1 {
      font-size: 1.2rem;
      color: #e94560;
      margin-right: 20px;
    }

    .stock-input {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stock-input label {
      font-size: 0.9rem;
      color: #aaa;
    }

    .stock-input input {
      padding: 8px 12px;
      border-radius: 4px;
      border: 1px solid #0f3460;
      background: #1a1a2e;
      color: #eee;
      font-size: 1rem;
      width: 150px;
    }

    .stock-input input:focus {
      outline: none;
      border-color: #e94560;
    }

    .fetch-btn {
      padding: 8px 20px;
      border-radius: 4px;
      border: none;
      background: #e94560;
      color: white;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .fetch-btn:hover {
      background: #d1364f;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Left Panel */
    .left-panel {
      width: 40%;
      border-right: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
    }

    .tabs {
      display: flex;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }

    .tab {
      flex: 1;
      padding: 12px 20px;
      text-align: center;
      cursor: pointer;
      font-size: 0.9rem;
      color: #aaa;
      border: none;
      background: transparent;
      transition: all 0.2s;
    }

    .tab:hover {
      color: #eee;
      background: #0f3460;
    }

    .tab.active {
      color: #e94560;
      border-bottom: 2px solid #e94560;
    }

    .tab-content {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .tab-content h3 {
      color: #e94560;
      margin-bottom: 15px;
      font-size: 1rem;
    }

    .tab-content select {
      width: 100%;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #0f3460;
      background: #1a1a2e;
      color: #eee;
      margin-bottom: 15px;
    }

    .tab-content button {
      padding: 8px 20px;
      border-radius: 4px;
      border: none;
      background: #e94560;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    .tab-content button:hover {
      background: #d1364f;
    }

    /* Right Panel */
    .right-panel {
      width: 60%;
      background: #0f3460;
      padding: 20px;
      overflow-y: auto;
    }

    .right-panel h2 {
      color: #e94560;
      margin-bottom: 20px;
      font-size: 1.1rem;
    }

    .right-panel .content-area {
      background: #1a1a2e;
      border-radius: 8px;
      padding: 20px;
      min-height: 300px;
    }

    .right-panel pre {
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .placeholder-text {
      color: #666;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <h1>TradingYourModel</h1>
    <div class="stock-input">
      <label for="symbol">Stock Symbol:</label>
      <input type="text" id="symbol" placeholder="AAPL" value="AAPL">
    </div>
  </div>

  <div class="main-content">
    <div class="left-panel">
      <div class="tabs">
        <button class="tab active" id="tab-fundamental">Fundamental</button>
        <button class="tab" id="tab-indicator">Indicator</button>
        <button class="tab" id="tab-model">Model</button>
      </div>
      <div class="tab-content" id="tab-content">
        <!-- Tab-specific content will be rendered here -->
      </div>
    </div>

    <div class="right-panel">
      <h2 id="right-title">Output</h2>
      <div class="content-area" id="right-content">
        <pre id="output" class="placeholder-text">Enter a stock symbol and click a tab to view data.</pre>
        <h3 id="bull-title" style="display:none; color:#e94560;">Bull</h3>
        <pre id="bull-response" class="placeholder-text" style="display:none;">Bull response will appear here.</pre>
        <h3 id="bear-title" style="display:none; color:#e94560;">Bear</h3>
        <pre id="bear-response" class="placeholder-text" style="display:none;">Bear response will appear here.</pre>
      </div>
    </div>
  </div>

  <script>
    let currentTab = 'fundamental';
    const API_BASE = 'http://localhost:8765';

    const indicators = [
      { value: 'rsi', label: 'RSI' },
      { value: 'macd', label: 'MACD' },
      { value: 'macds', label: 'MACD Signal' },
      { value: 'macdh', label: 'MACD Histogram' },
      { value: 'close_50_sma', label: '50 SMA' },
      { value: 'close_200_sma', label: '200 SMA' },
      { value: 'close_10_ema', label: '10 EMA' },
      { value: 'boll', label: 'Bollinger Middle' },
      { value: 'boll_ub', label: 'Bollinger Upper' },
      { value: 'boll_lb', label: 'Bollinger Lower' },
      { value: 'atr', label: 'ATR' },
      { value: 'vwma', label: 'VWMA' },
      { value: 'mfi', label: 'MFI' }
    ];

    function renderTabContent() {
      const tabContent = document.getElementById('tab-content');
      const rightTitle = document.getElementById('right-title');
      const output = document.getElementById('output');
      const bullTitle = document.getElementById('bull-title');
      const bearTitle = document.getElementById('bear-title');
      const bullResp = document.getElementById('bull-response');
      const bearResp = document.getElementById('bear-response');

      // Reset right panel visibility
      output.style.display = 'block';
      bullTitle.style.display = 'none';
      bearTitle.style.display = 'none';
      bullResp.style.display = 'none';
      bearResp.style.display = 'none';

      if (currentTab === 'fundamental') {
        rightTitle.textContent = 'Fundamentals';
        tabContent.innerHTML = `
          <h3>Company Fundamentals</h3>
          <p style="color: #aaa; margin-bottom: 15px;">View fundamental data including market cap, PE ratio, dividends, and more.</p>
          <button id="load-fundamental">Load Fundamentals</button>
        `;
      } else if (currentTab === 'indicator') {
        rightTitle.textContent = 'Indicator';
        tabContent.innerHTML = `
          <h3>Technical Indicators</h3>
          <label for="indicator-select">Select Indicator:</label>
          <select id="indicator-select">
            ${indicators.map(ind => `<option value="${ind.value}">${ind.label}</option>`).join('')}
          </select>
          <button id="load-indicator">Load Indicator</button>
        `;
      } else if (currentTab === 'model') {
        rightTitle.textContent = 'Model';
        // hide generic output
        output.style.display = 'none';
        // show placeholders for responses
        bullTitle.style.display = 'block';
        bearTitle.style.display = 'block';
        bullResp.style.display = 'block';
        bearResp.style.display = 'block';
        tabContent.innerHTML = `
          <h3>Model</h3>
          <label for="model-indicator-select">Select Indicators:</label>
          <select id="model-indicator-select" multiple style="height:200px;">
            ${indicators.map(ind => `<option value="${ind.value}">${ind.label}</option>`).join('')}
          </select>
          <button id="ask-llm">Ask LLM</button>
        `;
        document.getElementById('ask-llm').addEventListener('click', handleAskLLM);
      }

      attachTabListeners();
    }

    function attachTabListeners() {
      const loadBtn = document.getElementById('load-fundamental') || document.getElementById('load-indicator');
      if (loadBtn) {
        loadBtn.addEventListener('click', handleLoad);
      }
    }

    async function handleLoad() {
      const symbol = document.getElementById('symbol').value.trim().toUpperCase();
      if (!symbol) {
        alert('Please enter a stock symbol');
        return;
      }

      const output = document.getElementById('output');
      output.textContent = 'Loading...';
      output.classList.remove('placeholder-text');

      try {
        if (currentTab === 'fundamental') {
          const response = await fetch(`${API_BASE}/fundamentals/${symbol}`);
          const result = await response.text();
          output.textContent = result;
        } else {
          const indicator = document.getElementById('indicator-select').value;
          const response = await fetch(`${API_BASE}/indicator/${symbol}/${indicator}`);
          const result = await response.text();
          output.textContent = result;
        }
      } catch (e) {
        output.textContent = `Error: ${e.message}`;
      }
    }

    document.getElementById('tab-fundamental').addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-fundamental').classList.add('active');
      currentTab = 'fundamental';
      renderTabContent();
    });

    document.getElementById('tab-indicator').addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-indicator').classList.add('active');
      currentTab = 'indicator';
      renderTabContent();
    });

    document.getElementById('tab-model').addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-model').classList.add('active');
      currentTab = 'model';
      renderTabContent();
    });

    // Initial render
    renderTabContent();

    // Handler for Ask LLM button (model tab)
    async function handleAskLLM() {
      const selected = Array.from(document.getElementById('model-indicator-select').selectedOptions).map(o => o.value);
      if (selected.length === 0) {
        alert('Select at least one indicator');
        return;
      }
      const symbol = document.getElementById('symbol').value.trim().toUpperCase();
      const bullResp = document.getElementById('bull-response');
      const bearResp = document.getElementById('bear-response');
      bullResp.textContent = 'Loading...';
      bearResp.textContent = 'Loading...';
      try {
        const bull = await fetch(`${API_BASE}/model/bull`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ symbol, indicators: selected })
        }).then(r => r.text());
        const bear = await fetch(`${API_BASE}/model/bear`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ symbol, indicators: selected })
        }).then(r => r.text());
        bullResp.textContent = bull;
        bearResp.textContent = bear;
      } catch (e) {
        bullResp.textContent = `Error: ${e.message}`;
        bearResp.textContent = `Error: ${e.message}`;
      }
    }
  </script>
</body>
</html>
